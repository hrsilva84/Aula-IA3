<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetSys ERP · Gestão Inteligente para PetShop</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f5f2;
  --bg2:#f0ede8;
  --bg3:#e8e4dd;
  --surface:#ffffff;
  --surface2:#faf9f7;
  --border:#ddd9d2;
  --border2:#ccc7bf;
  --text:#1a1814;
  --text2:#5c574f;
  --text3:#9c978e;
  --accent:#2d6a4f;
  --accent-light:#e8f4ee;
  --accent2:#c17b3f;
  --accent2-light:#fdf3e8;
  --danger:#c0392b;
  --danger-light:#fdf0ee;
  --warn:#d4700a;
  --warn-light:#fef4e8;
  --info:#1a5276;
  --info-light:#eaf2f8;
  --radius:10px;
  --radius-sm:7px;
  --radius-lg:16px;
  --font:'DM Sans',sans-serif;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── SIDEBAR ── */
.layout{display:flex;min-height:100vh}

.sidebar{
  width:220px;
  min-height:100vh;
  background:var(--text);
  display:flex;
  flex-direction:column;
  position:fixed;
  left:0;top:0;bottom:0;
  z-index:50;
  transition:width 0.2s;
}

.sidebar-logo{
  padding:28px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.logo-mark{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:800;
  color:#fff;
  letter-spacing:-0.03em;
  line-height:1;
}
.logo-mark span{color:var(--accent2);font-weight:400}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px}

.sidebar-nav{padding:12px 0;flex:1}
.nav-section-label{
  font-size:9px;
  font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  padding:12px 20px 6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 20px;
  font-size:13px;
  font-weight:500;
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:all 0.15s;
  border-left:3px solid transparent;
  font-family:var(--font);
  background:none;
  border-right:none;
  border-top:none;
  border-bottom:none;
  width:100%;
  text-align:left;
  letter-spacing:-0.01em;
}
.nav-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.05)}
.nav-item.active{
  color:#fff;
  background:rgba(255,255,255,0.08);
  border-left-color:var(--accent2);
}
.nav-icon{width:16px;text-align:center;font-size:14px;opacity:0.8}

.sidebar-footer{
  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,0.07);
  font-size:11px;
  color:rgba(255,255,255,0.25);
}
.sidebar-footer strong{display:block;color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:2px}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}

.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:40;
}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-0.02em}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{
  width:32px;height:32px;
  border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
  font-family:var(--font-display);
}
.topbar-date{font-size:12px;color:var(--text3);font-family:var(--font-mono)}

/* ── CONTENT ── */
.content{padding:24px 28px;flex:1}

/* ── SECTION HEADER ── */
.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.section-heading{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.02em;
}
.section-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px 20px;
  position:relative;
  overflow:hidden;
  transition:box-shadow 0.2s;
}
.kpi:hover{box-shadow:var(--shadow-md)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.kpi-value{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-0.03em;color:var(--text)}
.kpi-badge{
  display:inline-block;
  font-size:10px;
  font-weight:600;
  padding:2px 8px;
  border-radius:20px;
  margin-top:6px;
  font-family:var(--font-mono);
}
.kpi-badge.up{background:var(--accent-light);color:var(--accent)}
.kpi-badge.neutral{background:var(--bg2);color:var(--text3)}
.kpi-badge.warn{background:var(--warn-light);color:var(--warn)}
.kpi-accent{
  position:absolute;
  right:16px;top:16px;
  font-size:22px;
  opacity:0.12;
}

/* ── CHART ── */
.chart-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px 22px;
  margin-bottom:20px;
}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:-0.01em}
.chart-wrap{position:relative;height:200px}

/* ── PANELS ── */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  margin-bottom:20px;
}
.panel-header{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--surface2);
}
.panel-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.panel-title .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.panel-title .dot.amber{background:var(--accent2)}
.panel-body{padding:20px}

/* ── GRID FORMS ── */
.form-grid{display:grid;gap:12px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.fg-4{grid-template-columns:1fr 1fr 1fr auto}
.fg-5{grid-template-columns:1fr 1fr 1fr 1fr auto}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text3)}
.field input,.field select,.field textarea{
  font-family:var(--font);
  font-size:13px;
  padding:9px 12px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  transition:border-color 0.15s,box-shadow 0.15s;
  outline:none;
  width:100%;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(45,106,79,0.1);
  background:var(--surface);
}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--surface);color:var(--text)}

/* ── BUTTONS ── */
.btn{
  font-family:var(--font);
  font-size:12px;
  font-weight:600;
  padding:9px 16px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  border:1.5px solid transparent;
  transition:all 0.15s;
  display:inline-flex;
  align-items:center;
  gap:6px;
  letter-spacing:-0.01em;
  white-space:nowrap;
}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#245c43;box-shadow:0 4px 12px rgba(45,106,79,0.3)}
.btn-amber{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn-amber:hover{background:#a86a34;box-shadow:0 4px 12px rgba(193,123,63,0.3)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:rgba(192,57,43,0.2)}
.btn-danger:hover{background:#fce0dd}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:var(--bg2);
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text3);
  padding:10px 14px;
  text-align:left;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--bg2);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
tbody td{padding:10px 14px;color:var(--text);vertical-align:middle}
.td-mono{font-family:var(--font-mono);font-size:12px}
.td-bold{font-weight:600}
.td-muted{color:var(--text3)}
.td-actions{display:flex;gap:6px;align-items:center}

/* ── BADGES ── */
.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:600;
  padding:3px 9px;
  border-radius:20px;
  letter-spacing:0.03em;
  white-space:nowrap;
}
.badge-green{background:var(--accent-light);color:var(--accent)}
.badge-amber{background:var(--accent2-light);color:var(--accent2)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:var(--bg2);color:var(--text3)}
.badge-info{background:var(--info-light);color:var(--info)}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── SEARCH / FILTER BAR ── */
.filter-bar{
  display:flex;
  gap:8px;
  align-items:center;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  flex-wrap:wrap;
}
.filter-bar input,.filter-bar select{
  font-family:var(--font);
  font-size:12px;
  padding:7px 11px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  outline:none;
  transition:border-color 0.15s;
}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
.filter-bar input{min-width:180px}

/* ── STAT ROW ── */
.stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.stat-pill{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
}
.stat-pill-label{color:var(--text3);font-size:11px}
.stat-pill-value{font-weight:700;font-family:var(--font-mono);color:var(--text);font-size:13px}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;
  padding:48px 20px;
  color:var(--text3);
}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
.empty-msg{font-size:13px;font-weight:500}
.empty-sub{font-size:11px;margin-top:4px}

/* ── TOAST ── */
#toast-wrap{
  position:fixed;bottom:20px;right:20px;
  z-index:9999;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast{
  font-size:12px;font-weight:500;
  padding:11px 16px;
  border-radius:var(--radius-sm);
  border:1px solid;
  display:flex;align-items:center;gap:8px;
  pointer-events:all;
  font-family:var(--font);
  min-width:220px;
  animation:toastIn 0.22s ease;
  box-shadow:var(--shadow-md);
}
.toast.ok{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.toast.err{background:var(--surface);border-color:var(--danger);color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── CHART ROW 2COL ── */
.chart-row-2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}

/* ── EXPORT PAGE ── */
.export-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.export-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  text-align:center;
  transition:all 0.2s;
}
.export-card:hover{background:var(--surface);box-shadow:var(--shadow)}
.export-card-icon{font-size:32px;margin-bottom:12px}
.export-card-title{font-weight:700;font-size:14px;margin-bottom:4px;font-family:var(--font-display)}
.export-card-desc{font-size:11px;color:var(--text3);margin-bottom:14px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{width:60px}
  .logo-mark,.logo-sub,.nav-section-label,.nav-item span,.sidebar-footer{display:none}
  .nav-icon{margin:0}
  .nav-item{justify-content:center;padding:12px}
  .main{margin-left:60px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .fg-3,.fg-4,.fg-5{grid-template-columns:1fr 1fr}
  .chart-row-2{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpi-row{grid-template-columns:1fr}
  .fg-2,.fg-3,.fg-4,.fg-5{grid-template-columns:1fr}
  .content{padding:16px}
}
</style>
</head>
<body>

<div id="toast-wrap"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Pet<span>Sys</span></div>
      <div class="logo-sub">ERP · PetShop</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <button class="nav-item active" data-section="dashboard">
        <span class="nav-icon">▤</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-section="clientes">
        <span class="nav-icon">◉</span>
        <span>Clientes</span>
      </button>
      <div class="nav-section-label">Operações</div>
      <button class="nav-item" data-section="estoque">
        <span class="nav-icon">▦</span>
        <span>Estoque</span>
      </button>
      <button class="nav-item" data-section="movimentacoes">
        <span class="nav-icon">⇅</span>
        <span>Movimentações</span>
      </button>
      <button class="nav-item" data-section="servicos">
        <span class="nav-icon">✂</span>
        <span>Serviços</span>
      </button>
      <div class="nav-section-label">Sistema</div>
      <button class="nav-item" data-section="exportar">
        <span class="nav-icon">↓</span>
        <span>Exportar</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <strong>PetSys v2.0</strong>
      Gestão Inteligente
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbarDate"></div>
        <div class="avatar">PS</div>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
// ── DATA ──
let clientes    = JSON.parse(localStorage.getItem('ps_clientes'))     || [];
let estoque     = JSON.parse(localStorage.getItem('ps_estoque'))      || [];
let servicos    = JSON.parse(localStorage.getItem('ps_servicos'))     || [];
let movimentos  = JSON.parse(localStorage.getItem('ps_movimentos'))   || [];

const servicosBase = [
  {nome:'Banho',base:45},
  {nome:'Tosa',base:50},
  {nome:'Consulta',base:90},
  {nome:'Banho + Tosa',base:85},
  {nome:'Vacinação',base:70},
  {nome:'Hospedagem',base:120},
  {nome:'Adestramento',base:80},
  {nome:'Exame clínico',base:110}
];

function save(){
  localStorage.setItem('ps_clientes',JSON.stringify(clientes));
  localStorage.setItem('ps_estoque',JSON.stringify(estoque));
  localStorage.setItem('ps_servicos',JSON.stringify(servicos));
  localStorage.setItem('ps_movimentos',JSON.stringify(movimentos));
}

// ── UTILS ──
const R$  = v => `R$ ${(+v).toFixed(2).replace('.',',')}`;
const pct = v => `${(+v).toFixed(1)}%`;
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('pt-BR') : '—';
const fmtDT   = iso => iso ? new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
const uid     = () => Date.now() + Math.random();

function toast(msg, type='ok'){
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='ok'?'✓':'✕'}</span> ${msg}`;
  w.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

// ── DATE ──
function setDate(){
  const d = new Date();
  document.getElementById('topbarDate').textContent =
    d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}
setDate();

// ── CHARTS ──
let _charts = {};
function destroyChart(id){ if(_charts[id]){ _charts[id].destroy(); delete _charts[id]; } }

// ── NAVIGATION ──
const pageTitles = {
  dashboard:'Dashboard',
  clientes:'Clientes & Tutores',
  estoque:'Controle de Estoque',
  movimentacoes:'Movimentações',
  servicos:'Serviços',
  exportar:'Exportar Dados'
};

function nav(section){
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.section===section);
  });
  document.getElementById('pageTitle').textContent = pageTitles[section]||section;
  Object.keys(_charts).forEach(destroyChart);
  const renders = {dashboard:renderDashboard,clientes:renderClientes,estoque:renderEstoque,movimentacoes:renderMovimentacoes,servicos:renderServicos,exportar:renderExportar};
  if(renders[section]) renders[section]();
}

document.querySelectorAll('.nav-item').forEach(b=>{
  b.addEventListener('click',()=>nav(b.dataset.section));
});

// ── KPIs ──
function getKPIs(){
  const receita       = servicos.reduce((s,x)=>s+x.preco,0);
  const custo         = servicos.reduce((s,x)=>s+x.custoProdutos,0);
  const lucro         = receita - custo;
  const margem        = receita ? (lucro/receita)*100 : 0;
  const ticket        = servicos.length ? receita/servicos.length : 0;
  const qtdConsumida  = servicos.reduce((s,x)=>s+x.quantidade,0);
  const estoqueQtd    = estoque.reduce((s,p)=>s+p.quantidade,0);
  const giro          = estoqueQtd ? qtdConsumida/(estoqueQtd+0.001) : 0;
  const estoqueValor  = estoque.reduce((s,p)=>s+(p.custoUnitario*p.quantidade),0);
  let diffs=[];
  clientes.forEach(c=>{
    const v=servicos.filter(s=>s.clienteId===c.id).sort((a,b)=>new Date(a.data)-new Date(b.data));
    for(let i=1;i<v.length;i++){
      const d=(new Date(v[i].data)-new Date(v[i-1].data))/(86400000);
      if(d>0) diffs.push(d);
    }
  });
  const tempoMedio = diffs.length ? diffs.reduce((a,b)=>a+b,0)/diffs.length : 0;
  const baixoEstoque = estoque.filter(p=>p.quantidade<10).length;
  return {receita,custo,lucro,margem,ticket,giro,estoqueValor,tempoMedio,baixoEstoque,totalServicos:servicos.length,totalClientes:clientes.length};
}

function getReceitaDiaria(){
  const map={};
  servicos.forEach(s=>{
    const d=s.data.slice(0,10);
    map[d]=(map[d]||0)+s.preco;
  });
  const days=[];
  for(let i=29;i>=0;i--){
    const dt=new Date(); dt.setDate(dt.getDate()-i);
    const k=dt.toISOString().slice(0,10);
    days.push({label:`${dt.getDate()}/${dt.getMonth()+1}`,value:map[k]||0});
  }
  return days;
}

function getTopServicos(){
  const map={};
  servicos.forEach(s=>{ map[s.servicoNome]=(map[s.servicoNome]||0)+1; });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
}

  const d=document.getElementById('filterMovData').value;

function addMovimento(){
  if(!estoque.length){ toast('Cadastre produtos primeiro','err'); return; }
  const pId=document.getElementById('movProd').value;
  const produto=estoque.find(p=>String(p.id)===String(pId));
  if(!produto){ toast('Produto não encontrado','err'); return; }
  const tipo=document.getElementById('movTipo').value;
  const qtd=parseInt(document.getElementById('movQtd').value);
  if(!qtd||qtd<1){ toast('Informe uma quantidade válida','err'); return; }
  if(tipo==='Saída'&&produto.quantidade<qtd){ toast(`Estoque insuficiente. Disponível: ${produto.quantidade}un`,'err'); return; }
  if(tipo==='Entrada') produto.quantidade+=qtd;
  else produto.quantidade-=qtd;
  movimentos.push({id:uid(),produtoId:produto.id,produtoNome:produto.nome,tipo,quantidade:qtd,obs:document.getElementById('movObs').value,data:new Date().toISOString()});

  // preview dinâmico
  ['srvTipo','srvProd','srvQtd','srvMarkup'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('change',updatePreview);
    if(el&&el.tagName==='INPUT') el.addEventListener('input',updatePreview);
  });
}

function updatePreview(){
  const sel=document.getElementById('srvTipo');
  const opt=sel?.options[sel.selectedIndex];
  const base=parseFloat(opt?.dataset.base||0);
  const pId=document.getElementById('srvProd')?.value;
  const qtd=parseFloat(document.getElementById('srvQtd')?.value)||0;
  const markup=parseFloat(document.getElementById('srvMarkup')?.value)||1.5;
  const prod=estoque.find(p=>String(p.id)===String(pId));
  const custoProd=(prod?.custoUnitario||0)*qtd;
  const preco=base+(custoProd*markup);
  const lucro=preco-custoProd;
  const margem=preco?(lucro/preco)*100:0;
  document.getElementById('previewPreco').innerHTML=`
    <span style="color:var(--text3)">Base: <b style="color:var(--text)">${R$(base)}</b></span> &nbsp;·&nbsp;
    <span style="color:var(--text3)">Custo produtos: <b style="color:var(--text)">${R$(custoProd)}</b></span> &nbsp;·&nbsp;
    <span style="color:var(--accent)">Preço final: <b>${R$(preco)}</b></span> &nbsp;·&nbsp;
    <span style="color:var(--text3)">Margem: <b style="color:var(--text)">${pct(margem)}</b></span>
  `;
}

function renderSrvRows(list){
  return [...list].reverse().map(s=>`
    <tr>
      <td class="td-mono td-muted">${fmtDate(s.data)}</td>
      <td class="td-bold">${s.clienteNome}</td>
      <td><span class="badge badge-info">${s.servicoNome}</span></td>
      <td class="td-muted">${s.produtoUtilizado||'—'}</td>
      <td class="td-mono">${s.quantidade}</td>
      <td class="td-mono td-muted">${R$(s.custoProdutos)}</td>
      <td class="td-mono td-bold">${R$(s.preco)}</td>
      <td class="td-mono" style="color:var(--accent)">${R$(s.lucro)}</td>
      <td><span class="badge ${s.margem>50?'badge-green':s.margem>30?'badge-amber':'badge-red'}">${pct(s.margem)}</span></td>
    </tr>`).join('');
}

function filterServicos(){
  const q=(document.getElementById('filterSrvCli').value||'').toLowerCase();
  const d=document.getElementById('filterSrvData').value;
  const t=document.getElementById('filterSrvTipo').value;
  const f=servicos.filter(s=>
    (!(q)||(s.clienteNome||'').toLowerCase().includes(q))&&
    (!d||s.data.slice(0,10)===d)&&
    (!t||s.servicoNome===t)
  );
  document.getElementById('srvTbody').innerHTML=renderSrvRows(f);
}

function clearSrvFilter(){
  document.getElementById('filterSrvCli').value='';
  document.getElementById('filterSrvData').value='';
  document.getElementById('filterSrvTipo').value='';
  filterServicos();
}

function registrarServico(){
  if(!clientes.length){ toast('Cadastre um cliente primeiro','err'); return; }
  const cId=document.getElementById('srvCliente').value;
  const cliente=clientes.find(c=>String(c.id)===String(cId));
  if(!cliente){ toast('Cliente inválido','err'); return; }
  const sel=document.getElementById('srvTipo');
  const sNome=sel.value;
  const base=parseFloat(sel.options[sel.selectedIndex].dataset.base);
  const pId=document.getElementById('srvProd').value;
  const qtd=parseFloat(document.getElementById('srvQtd').value)||0;
  const markup=parseFloat(document.getElementById('srvMarkup').value)||1.5;
  const prod=pId?estoque.find(p=>String(p.id)===String(pId)):null;
  if(prod&&prod.quantidade<qtd){ toast(`Estoque insuficiente de "${prod.nome}". Disponível: ${prod.quantidade}`,'err'); return; }
  const custoProd=(prod?.custoUnitario||0)*qtd;
  const preco=base+(custoProd*markup);
  const lucro=preco-custoProd;
  const margem=preco?(lucro/preco)*100:0;
  if(prod&&qtd>0){ prod.quantidade-=qtd; }
  const s={
    id:uid(),clienteId:cliente.id,clienteNome:cliente.nome,
    servicoNome:sNome,
    produtoUtilizado:prod?.nome||null,produtoId:prod?.id||null,
    quantidade:qtd,custoProdutos:custoProd,
    preco,lucro,margem,
    obs:document.getElementById('srvObs').value,
    data:new Date().toISOString()
  };
  servicos.push(s);
  cliente.ultimaVisita=new Date().toISOString();
  cliente.totalServicos=(cliente.totalServicos||0)+1;
  save();
  toast(`Serviço "${sNome}" registrado · ${R$(preco)}`);
  renderServicos();
}

// ── EXPORTAR ──
function renderExportar(){
  const K=getKPIs();
  const html=`
    <div class="section-header">
      <div><div class="section-heading">Exportar Dados</div><div class="section-sub">Todos os dados em formato XLSX</div></div>
    </div>
    <div class="stat-row" style="margin-bottom:20px">
      <div class="stat-pill"><div class="stat-pill-label">Clientes</div><div class="stat-pill-value">${clientes.length}</div></div>
      <div class="stat-pill"><div class="stat-pill-label">Produtos</div><div class="stat-pill-value">${estoque.length}</div></div>
      <div class="stat-pill"><div class="stat-pill-label">Serviços</div><div class="stat-pill-value">${servicos.length}</div></div>
      <div class="stat-pill"><div class="stat-pill-label">Movimentações</div><div class="stat-pill-value">${movimentos.length}</div></div>
    </div>
    <div class="export-grid">
      <div class="export-card">
        <div class="export-card-icon">📊</div>
        <div class="export-card-title">Relatório Completo</div>
        <div class="export-card-desc">Todas as tabelas em abas separadas: clientes, estoque, serviços e movimentações.</div>
        <button class="btn btn-primary" onclick="exportExcel()">Exportar XLSX</button>
      </div>
      <div class="export-card">
        <div class="export-card-icon">💰</div>
        <div class="export-card-title">Relatório Financeiro</div>
        <div class="export-card-desc">Resumo de receitas, custos, lucros e margens por período.</div>
        <button class="btn btn-amber" onclick="exportFinanceiro()">Exportar CSV</button>
      </div>
      <div class="export-card">
        <div class="export-card-icon">⚠️</div>
        <div class="export-card-title">Limpar Dados</div>
        <div class="export-card-desc">Remove todos os dados do sistema. Ação irreversível — exporte antes.</div>
        <button class="btn btn-danger" onclick="clearAll()">Limpar tudo</button>
      </div>
    </div>
  `;
  document.getElementById('mainContent').innerHTML=html;
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(clientes),'Clientes');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(estoque),'Estoque');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(servicos),'Servicos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(movimentos),'Movimentacoes');
  XLSX.writeFile(wb,`petsys_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Arquivo exportado com sucesso');
}

function exportFinanceiro(){
  const rows=servicos.map(s=>({Data:fmtDate(s.data),Cliente:s.clienteNome,Servico:s.servicoNome,Custo:s.custoProdutos.toFixed(2),Preco:s.preco.toFixed(2),Lucro:s.lucro.toFixed(2),Margem:s.margem.toFixed(1)+'%'}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Financeiro');
  XLSX.writeFile(wb,`petsys_financeiro_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Relatório financeiro exportado');
}

function clearAll(){
  if(!confirm('Tem certeza? Todos os dados serão apagados permanentemente.')) return;
  clientes=[];estoque=[];servicos=[];movimentos=[];
  save(); toast('Dados removidos'); renderExportar();
}

// ── HELPERS ──
function toggleForm(id){
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

function emptyState(icon,msg,sub){
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-msg">${msg}</div><div class="empty-sub">${sub}</div></div>`;
}

// ── BOOT ──
nav('dashboard');
</script>
